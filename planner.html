<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>主人计划</title>
<style>
:root {
  --bg: #f5f5f0;
  --card: #ffffff;
  --border: #e8e8e3;
  --text: #2c2c2c;
  --text-dim: #999;
  --accent: #e67e22;
  --accent-light: #fef0e0;
  --red: #e74c3c;
  --red-light: #fdecea;
  --green: #27ae60;
  --green-light: #e8f8f0;
  --blue: #3498db;
  --blue-light: #eaf4fb;
  --radius: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh; line-height: 1.6;
  padding-bottom: 80px;
}

/* Header */
.header {
  max-width: 640px; margin: 0 auto;
  padding: 28px 20px 0;
}
.header h1 { font-size: 22px; font-weight: 800; }
.header h1 span { color: var(--accent); }
.header-date { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

/* Container */
.container { max-width: 640px; margin: 0 auto; padding: 16px 20px; }

/* ===== 同步状态栏 ===== */
.sync-bar {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px 16px;
  margin-bottom: 16px; display: flex; align-items: center;
  gap: 10px; flex-wrap: wrap;
}
.sync-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 13px; color: var(--text-dim); flex: 1; min-width: 150px;
}
.sync-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); flex-shrink: 0;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.sync-time { font-size: 12px; color: var(--text-dim); }
.sync-btns { display: flex; gap: 6px; }
.sync-btn {
  padding: 6px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text-dim); font-size: 12px; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
}
.sync-btn:hover { border-color: var(--accent); color: var(--text); }
.sync-btn.primary {
  background: var(--accent); color: #fff;
  border-color: var(--accent); font-weight: 600;
}
.sync-btn.primary:hover { background: #d35400; }

/* ===== 同步引导弹窗 ===== */
.sync-modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.5); z-index: 200;
  align-items: center; justify-content: center;
}
.sync-modal-overlay.show { display: flex; }
.sync-modal {
  background: var(--card); border-radius: 16px;
  padding: 28px; width: 90%; max-width: 460px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}
.sync-modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
.sync-modal .sub { font-size: 13px; color: var(--text-dim); margin-bottom: 20px; }

.sync-step {
  display: flex; gap: 14px; padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.sync-step:last-child { border-bottom: none; }
.sync-step-num {
  width: 28px; height: 28px; border-radius: 50%;
  background: var(--accent-light); color: var(--accent);
  font-size: 14px; font-weight: 700; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.sync-step-body { flex: 1; }
.sync-step-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.sync-step-desc { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
.sync-step-btn {
  margin-top: 8px; padding: 8px 18px; border-radius: 8px;
  border: none; font-size: 14px; cursor: pointer;
  font-weight: 600; transition: all 0.2s;
}
.sync-step-btn.upload {
  background: var(--accent); color: #fff;
}
.sync-step-btn.upload:hover { background: #d35400; }
.sync-step-btn.download {
  background: var(--green); color: #fff;
}
.sync-step-btn.download:hover { background: #219a52; }
.sync-step-btn:disabled {
  opacity: 0.5; cursor: not-allowed;
}

.sync-modal-footer {
  margin-top: 20px; padding-top: 14px;
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.sync-modal-footer .tip {
  font-size: 12px; color: var(--text-dim);
  line-height: 1.5;
}
.sync-modal-close {
  padding: 6px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: none;
  color: var(--text-dim); font-size: 13px; cursor: pointer;
}

/* Habits */
.habits {
  display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
}
.habit-chip {
  padding: 8px 16px; border-radius: 20px;
  background: var(--card); border: 1.5px solid var(--border);
  font-size: 14px; cursor: pointer; transition: all 0.2s;
  user-select: none;
}
.habit-chip:active { transform: scale(0.96); }
.habit-chip.active {
  background: var(--green-light); border-color: var(--green);
  color: var(--green); text-decoration: line-through;
}

/* Section */
.section { margin-bottom: 24px; }
.section-title {
  font-size: 14px; font-weight: 700; color: var(--text-dim);
  margin-bottom: 10px; padding-left: 2px;
  display: flex; align-items: center; gap: 6px;
}

/* Task Item */
.task {
  display: flex; align-items: flex-start; gap: 12px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  margin-bottom: 8px; transition: all 0.2s;
  position: relative;
}
.task:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
.task.done { opacity: 0.5; }
.task.done .task-title { text-decoration: line-through; color: var(--text-dim); }

.task-check {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid #ccc; cursor: pointer; flex-shrink: 0;
  margin-top: 1px; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
}
.task-check:hover { border-color: var(--accent); }
.task-check.checked {
  background: var(--accent); border-color: var(--accent);
}
.task-check.checked::after {
  content: '\2713'; color: #fff; font-size: 13px; font-weight: bold;
}

.task-body { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 500; word-break: break-word; }
.task-sub {
  font-size: 12px; color: var(--text-dim); margin-top: 3px;
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.task-tag {
  font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 500;
}
.tag-overdue { background: var(--red-light); color: var(--red); }
.tag-today { background: var(--accent-light); color: var(--accent); }
.tag-tomorrow { background: #fff8e1; color: #f39c12; }
.tag-week { background: var(--blue-light); color: var(--blue); }
.tag-future { background: #f0f0f0; color: #888; }
.tag-recurring { background: #f3e8ff; color: #8b5cf6; }

.task-note { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

.task-actions {
  display: flex; gap: 2px; flex-shrink: 0;
  opacity: 0.35; transition: opacity 0.15s;
}
.task:hover .task-actions { opacity: 1; }
.task-btn {
  width: 28px; height: 28px; border-radius: 6px;
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px; display: flex;
  align-items: center; justify-content: center;
}
.task-btn:hover { background: #f0f0f0; }

/* Empty */
.empty { text-align: center; padding: 20px; color: var(--text-dim); font-size: 14px; }

/* FAB */
.fab {
  position: fixed; bottom: 28px; right: 28px;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--accent); color: #fff; border: none;
  font-size: 28px; cursor: pointer;
  box-shadow: 0 4px 14px rgba(230,126,34,0.4);
  transition: all 0.2s; z-index: 50;
  display: flex; align-items: center; justify-content: center;
}
.fab:hover { transform: scale(1.08); box-shadow: 0 6px 20px rgba(230,126,34,0.5); }
.fab:active { transform: scale(0.95); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 100;
  align-items: flex-end; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 16px 16px 0 0;
  padding: 24px; width: 100%; max-width: 640px;
  max-height: 85vh; overflow-y: auto;
  animation: slideUp 0.25s ease;
}
.modal h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 12px; color: var(--text-dim);
  margin-bottom: 5px; font-weight: 600;
}
.form-group input, .form-group textarea {
  width: 100%; padding: 10px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 15px; font-family: inherit;
  outline: none; transition: border 0.2s;
}
.form-group input:focus, .form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { min-height: 60px; resize: vertical; }
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px;
}
.btn {
  padding: 10px 22px; border-radius: 8px; border: none;
  font-size: 14px; cursor: pointer; font-weight: 600; transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: #d35400; }
.btn-cancel { background: var(--bg); color: var(--text-dim); }

/* Progress bar for habits */
.habit-progress {
  font-size: 12px; color: var(--text-dim); margin-bottom: 8px;
}

.habit-row {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.habit-row:last-child { border-bottom: none; }
.habit-row-icon {
  font-size: 22px; width: 36px; text-align: center;
}
.habit-row-info { flex: 1; }
.habit-row-name { font-size: 15px; font-weight: 500; }
.habit-row-detail { font-size: 12px; color: var(--text-dim); }
.habit-row-del {
  width: 28px; height: 28px; border-radius: 6px;
  background: none; border: none; color: var(--text-dim);
  cursor: pointer; font-size: 14px;
}
.habit-row-del:hover { background: var(--red-light); color: var(--red); }
.btn-add {
  width: 100%; padding: 10px; border-radius: 8px;
  border: 1.5px dashed var(--border); background: none;
  color: var(--text-dim); font-size: 14px; cursor: pointer;
  margin-top: 12px; transition: all 0.2s;
}
.btn-add:hover { border-color: var(--accent); color: var(--accent); }

/* Responsive */
@media (min-width: 660px) {
  .modal { border-radius: 16px; margin-bottom: 40px; }
  .modal-overlay { align-items: center; }
}
@media (max-width: 640px) {
  .fab { bottom: 20px; right: 20px; }
  .sync-bar { flex-direction: column; align-items: stretch; }
  .sync-btns { justify-content: stretch; }
  .sync-btns .sync-btn { flex: 1; text-align: center; }
}
</style>
</head>
<body>

<div class="header">
  <h1>🦐 <span>主人计划</span></h1>
  <div class="header-date" id="headerDate"></div>
</div>

<div class="container">
  <!-- 同步状态栏 -->
  <div class="sync-bar">
    <div class="sync-status">
      <div class="sync-dot"></div>
      <span id="syncInfo">数据已自动保存</span>
    </div>
    <div class="sync-time" id="syncTime"></div>
    <div class="sync-btns">
      <button class="sync-btn" onclick="openSyncModal()">🔄 换电脑同步</button>
    </div>
  </div>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">

  <!-- Habits -->
  <div class="section">
    <div class="habit-progress" id="habitProgress"></div>
    <div class="habits" id="habitList"></div>
  </div>

  <!-- Sections rendered by JS -->
  <div id="taskSections"></div>
</div>

<!-- FAB -->
<button class="fab" onclick="openModal()">＋</button>

<!-- Task Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2 id="modalTitle">添加任务</h2>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>任务名称</label>
      <input type="text" id="taskTitle" placeholder="要做什么？" autofocus>
    </div>
    <div class="form-group">
      <label>截止日期（可选）</label>
      <input type="date" id="taskDate">
    </div>
    <div class="form-group">
      <label>循环（可选）</label>
      <select id="taskRecurrence" style="width:100%;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:15px;outline:none;">
        <option value="">不循环</option>
        <option value="每天">🔄 每天</option>
        <option value="每周">🔄 每周</option>
        <option value="每月">🔄 每月</option>
      </select>
    </div>
    <div class="form-group">
      <label>备注（可选）</label>
      <textarea id="taskNote" placeholder="补充说明…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-primary" onclick="saveTask()">保存</button>
    </div>
  </div>
</div>

<!-- Habit Modal -->
<div class="modal-overlay" id="habitModal">
  <div class="modal">
    <h2>⚙️ 管理习惯</h2>
    <div id="habitModalList"></div>
    <div class="modal-actions">
      <button class="btn btn-cancel" onclick="closeHabitModal()">关闭</button>
      <button class="btn btn-primary" onclick="saveHabitChanges()">保存</button>
    </div>
  </div>
</div>

<!-- Sync Guide Modal -->
<div class="sync-modal-overlay" id="syncModal">
  <div class="sync-modal">
    <h2>🔄 换电脑怎么同步？</h2>
    <div class="sub">只需要两步，10秒钟搞定</div>

    <div class="sync-step">
      <div class="sync-step-num">1</div>
      <div class="sync-step-body">
        <div class="sync-step-title">在这台电脑导出数据</div>
        <div class="sync-step-desc">点击下方按钮，会下载一个 JSON 文件到你的电脑。<br>把这个文件存到<span style="font-weight:600;color:var(--text)">百度网盘</span>同步文件夹里。</div>
        <button class="sync-step-btn upload" onclick="doExport()">📤 保存到网盘文件夹</button>
      </div>
    </div>

    <div class="sync-step">
      <div class="sync-step-num">2</div>
      <div class="sync-step-body">
        <div class="sync-step-title">在另一台电脑导入数据</div>
        <div class="sync-step-desc">打开这个网址，点下方按钮，选择你刚才保存的 JSON 文件即可。</div>
        <button class="sync-step-btn download" onclick="doImport()">📥 选择JSON文件导入</button>
      </div>
    </div>

    <div class="sync-modal-footer">
      <div class="tip">💡 建议每次换电脑前都导出一次<br>这样两边的任务进度就不会丢了</div>
      <button class="sync-modal-close" onclick="closeSyncModal()">知道了</button>
    </div>
  </div>
</div>

<script>
// ===== Storage =====
let _tasksCache = null, _habitsCache = null;
const today = () => new Date().toISOString().slice(0, 10);

function loadTasks() {
  if (_tasksCache) return _tasksCache;
  const raw = localStorage.getItem('xx_tasks_v2');
  return _tasksCache = raw ? JSON.parse(raw) : DEFAULT_TASKS;
}
function saveTasks(d) {
  _tasksCache = d;
  localStorage.setItem('xx_tasks_v2', JSON.stringify(d));
  updateSyncTime();
}
function loadHabits() {
  if (_habitsCache) return _habitsCache;
  const raw = localStorage.getItem('xx_habits_v2');
  return _habitsCache = raw ? JSON.parse(raw) : DEFAULT_HABITS;
}
function saveHabits(d) {
  _habitsCache = d;
  localStorage.setItem('xx_habits_v2', JSON.stringify(d));
  updateSyncTime();
}

const DEFAULT_HABITS = [
  {id:'h1',icon:'🧘',name:'冥想',detail:'20分钟',active:false},
  {id:'h2',icon:'📖',name:'阅读',detail:'30分钟',active:false},

  {id:'h4',icon:'✍️',name:'复盘',detail:'每日总结',active:false},

// ===== 同步状态 =====
function updateSyncTime() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  document.getElementById('syncTime').textContent = `${h}:${m} 已保存`;
  document.getElementById('syncInfo').textContent = '数据已自动保存';
}

function openSyncModal() {
  document.getElementById('syncModal').classList.add('show');
}
function closeSyncModal() {
  document.getElementById('syncModal').classList.remove('show');
}

// ===== 导出/导入 =====
function doExport() {
  const blob = new Blob([JSON.stringify({tasks: loadTasks(), habits: loadHabits(), date: today(), exportedAt: new Date().toLocaleString('zh-CN')}, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '主人计划_' + today() + '.json';
  a.click();
  document.getElementById('syncInfo').textContent = '✅ 已导出，请存到百度网盘';
  document.getElementById('syncInfo').style.color = 'var(--green)';
  setTimeout(() => { document.getElementById('syncInfo').style.color = ''; }, 3000);
}

function doImport() {
  document.getElementById('importFile').click();
}

function importData(ev) {
  const f = ev.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = (e) => {
    try {
      const d = JSON.parse(e.target.result);
      if (!d.tasks && !d.habits) { alert('文件格式有误，请选择正确的导出文件'); return; }
      if (!confirm('导入后会覆盖当前所有数据，确定继续吗？')) return;
      if (d.tasks) saveTasks(d.tasks);
      if (d.habits) saveHabits(d.habits);
      render();
      closeSyncModal();
      document.getElementById('syncInfo').textContent = '✅ 导入成功！';
      document.getElementById('syncInfo').style.color = 'var(--green)';
      setTimeout(() => { document.getElementById('syncInfo').style.color = ''; }, 3000);
    } catch(err) { alert('文件格式有误，请选择正确的导出文件'); }
  };
  r.readAsText(f); ev.target.value = '';
}

// ===== 工具函数 =====
function daysDiff(dateStr) {
  if (!dateStr) return Infinity;
  const t = new Date(today()), d = new Date(dateStr);
  return Math.round((d - t) / 86400000);
}

function endOfWeek() {
  const d = new Date(), day = d.getDay();
  return new Date(d.getTime() + (7 - day) * 86400000).toISOString().slice(0,10);
}

function dateTag(task) {
  if (task.recurrence) return '<span class="task-tag tag-recurring">🔄 ' + task.recurrence + '</span>';
  const diff = daysDiff(task.date);
  if (!task.date) return '';
  if (diff < 0) return '<span class="task-tag tag-overdue">已过期' + Math.abs(diff) + '天</span>';
  if (diff === 0) return '<span class="task-tag tag-today">今天</span>';
  if (diff === 1) return '<span class="task-tag tag-tomorrow">明天</span>';
  if (diff <= 7) return '<span class="task-tag tag-week">' + diff + '天后</span>';
  const m = new Date(task.date).getMonth()+1, d = new Date(task.date).getDate();
  return '<span class="task-tag tag-future">' + m + '月' + d + '日</span>';
}

function tomorrow() {
  const d = new Date();
  d.setDate(d.getDate() + 1);
  return d.toISOString().slice(0, 10);
}

function categorize(tasks) {
  const t = today(), tmr = tomorrow(), we = endOfWeek();
  const r = {urgent:[], tomorrow:[], week:[], later:[], done:[]};
  tasks.forEach(tk => {
    if (tk.done) { r.done.push(tk); return; }
    if (tk.recurrence === '每天') { r.urgent.push(tk); return; }
    if (tk.recurrence && !tk.date) { r.later.push(tk); return; }
    if (tk.date && tk.date <= t) { r.urgent.push(tk); return; }
    if (tk.date && tk.date === tmr) { r.tomorrow.push(tk); return; }
    if (tk.date && tk.date <= we) { r.week.push(tk); return; }
    r.later.push(tk);
  });
  return r;
}

// ===== 启动 =====
render();
updateSyncTime();

// ===== Render =====
function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function renderTask(tk) {
  const noteHtml = tk.note ? '<div class="task-note">' + esc(tk.note) + '</div>' : '';
  return '<div class="task ' + (tk.done?'done':'') + '" data-id="' + tk.id + '">'
    + '<div class="task-check ' + (tk.done?'checked':'') + '" onclick="toggleTask(\'' + tk.id + '\')"></div>'
    + '<div class="task-body">'
    + '<div class="task-title">' + esc(tk.title) + '</div>'
    + '<div class="task-sub">' + dateTag(tk) + '</div>'
    + noteHtml
    + '</div>'
    + '<div class="task-actions">'
    + '<button class="task-btn" onclick="editTask(\'' + tk.id + '\')" title="编辑">✏️</button>'
    + '<button class="task-btn" onclick="deleteTask(\'' + tk.id + '\')" title="删除">🗑</button>'
    + '</div></div>';
}

function renderList(tasks) {
  if (!tasks.length) return '<div class="empty">✨ 暂无</div>';
  return tasks.sort((a,b) => {
    if (a.date && b.date) return a.date.localeCompare(b.date);
    if (a.date) return -1;
    if (b.date) return 1;
    return 0;
  }).map(renderTask).join('');
}

function render() {
  const tasks = loadTasks(), habits = loadHabits();
  const now = new Date();
  const wd = ['日','一','二','三','四','五','六'];
  document.getElementById('headerDate').textContent =
    now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + wd[now.getDay()];

  // Habits
  const active = habits.filter(h=>h.active).length;
  document.getElementById('habitProgress').innerHTML =
    active ? '今日习惯 ' + active + '/' + habits.length + ' ✨ · <span style="cursor:pointer" onclick="openHabitModal()" title="管理习惯">⚙️ 管理</span>' : '今日习惯 · <span style="cursor:pointer" onclick="openHabitModal()" title="管理习惯">⚙️ 管理</span>';
  const fixedChips = habits.map(h =>
    '<div class="habit-chip ' + (h.active?'active':'') + '" onclick="toggleHabit(\'' + h.id + '\')">' + h.icon + ' ' + esc(h.name) + '</div>'
  ).join('');
  document.getElementById('habitList').innerHTML = fixedChips;

  // Tasks
  const cat = categorize(tasks);
  const sections = [
    { title: '🔴 今天', tasks: cat.urgent },
    { title: '🟠 明天', tasks: cat.tomorrow },
    { title: '🟡 本周', tasks: cat.week },
    { title: '🔵 以后再说', tasks: cat.later },
    { title: '✅ 已完成', tasks: cat.done },
  ];
  document.getElementById('taskSections').innerHTML = sections.map(s => {
    if (s.title === '✅ 已完成' && !s.tasks.length) return '';
    return '<div class="section">'
      + '<div class="section-title">' + s.title + ' <span style="font-weight:400;color:var(--text-dim)">' + s.tasks.length + '</span></div>'
      + '<div>' + renderList(s.tasks) + '</div></div>';
  }).join('');
}

// ===== Actions =====
function toggleTask(id) {
  const d = loadTasks(), t = d.find(x=>x.id===id);
  if (!t) return;
  t.done = !t.done;
  t.doneDate = t.done ? today() : null;
  if (t.done && t.recurrence && t.date) {
    const dt = new Date(t.date);
    if (t.recurrence === '每天') dt.setDate(dt.getDate()+1);
    else if (t.recurrence === '每周') dt.setDate(dt.getDate()+7);
    else if (t.recurrence === '每月') dt.setMonth(dt.getMonth()+1);
    t.date = dt.toISOString().slice(0,10);
    t.done = false;
    t.doneDate = null;
  }
  saveTasks(d); render();
}

function deleteTask(id) {
  const d = loadTasks().filter(t=>t.id!==id);
  saveTasks(d); render();
}

function editTask(id) {
  const t = loadTasks().find(x=>x.id===id);
  if (!t) return;
  document.getElementById('modalTitle').textContent = '编辑';
  document.getElementById('editId').value = id;
  document.getElementById('taskTitle').value = t.title;
  document.getElementById('taskDate').value = t.date||'';
  document.getElementById('taskRecurrence').value = t.recurrence||'';
  document.getElementById('taskNote').value = t.note||'';
  document.getElementById('modal').classList.add('show');
  document.getElementById('taskTitle').focus();
}

function openModal() {
  document.getElementById('modalTitle').textContent = '添加任务';
  document.getElementById('editId').value = '';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDate').value = today();
  document.getElementById('taskNote').value = '';
  document.getElementById('taskRecurrence').value = '';
  document.getElementById('modal').classList.add('show');
  document.getElementById('taskTitle').focus();
}

function closeModal() { document.getElementById('modal').classList.remove('show'); }

function saveTask() {
  const title = document.getElementById('taskTitle').value.trim();
  if (!title) { document.getElementById('taskTitle').style.borderColor='var(--red)'; return; }
  const editId = document.getElementById('editId').value;
  const obj = {
    title,
    date: document.getElementById('taskDate').value,
    recurrence: document.getElementById('taskRecurrence').value,
    note: document.getElementById('taskNote').value.trim(),
    done: false, doneDate: null,
  };
  const d = loadTasks();
  if (editId) {
    const idx = d.findIndex(t=>t.id===editId);
    if (idx !== -1) d[idx] = {...d[idx], ...obj};
  } else {
    obj.id = Date.now().toString();
    d.push(obj);
  }
  saveTasks(d); closeModal(); render();
}

function toggleHabit(id) {
  const d = loadHabits(), h = d.find(x=>x.id===id);
  if (h) { h.active = !h.active; saveHabits(d); render(); }
}

// ===== Habit Management =====
let tempHabits = [];

function openHabitModal() {
  tempHabits = JSON.parse(JSON.stringify(loadHabits()));
  renderHabitModal();
  document.getElementById('habitModal').classList.add('show');
}

function closeHabitModal() {
  document.getElementById('habitModal').classList.remove('show');
}

function renderHabitModal() {
  const icons = ['🧘','📖','🏃','✍️','💤','💧','🧹','🍎','🎵','💡','📝','🧘‍♀️','🚴','🏊','🎨','🌿','💊','✨'];
  let html = '';
  html += '<div style="font-size:12px;color:var(--text-dim);margin:10px 0 6px;font-weight:600;">📌 固定习惯</div>';
  html += tempHabits.map((h, i) =>
    '<div class="habit-row" data-idx="' + i + '">'
    + '<div class="habit-row-icon"><select onchange="tempHabits[' + i + '].icon=this.value;renderHabitModal()" style="font-size:18px;border:none;background:none;cursor:pointer;outline:none;">'
    + icons.map(ic => '<option value="' + ic + '"' + (h.icon===ic?' selected':'') + '>' + ic + '</option>').join('')
    + '</select></div>'
    + '<div class="habit-row-info">'
    + '<input type="text" value="' + esc(h.name) + '" onchange="tempHabits[' + i + '].name=this.value" placeholder="习惯名称" style="font-size:15px;border:none;background:none;outline:none;width:100%;padding:2px 0;">'
    + '<input type="text" value="' + esc(h.detail||'') + '" onchange="tempHabits[' + i + '].detail=this.value" placeholder="补充说明" style="font-size:12px;color:var(--text-dim);border:none;background:none;outline:none;width:100%;padding:2px 0;">'
    + '</div>'
    + '<button class="habit-row-del" onclick="tempHabits.splice(' + i + ',1);renderHabitModal()" title="删除">🗑</button></div>'
  ).join('');
  html += '<button class="btn-add" onclick="tempHabits.push({id:\'h\'+Date.now(),icon:\'✨\',name:\'\',detail:\'\',active:false});renderHabitModal()">＋ 添加固定习惯</button>';

  document.getElementById('habitModalList').innerHTML = html;
}

function saveHabitChanges() {
  const valid = tempHabits.filter(h => h.name.trim());
  saveHabits(valid);
  closeHabitModal();
  render();
}

// Events
document.getElementById('modal').addEventListener('click', e => { if(e.target===e.currentTarget) closeModal(); });
document.getElementById('habitModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeHabitModal(); });
document.getElementById('syncModal').addEventListener('click', e => { if(e.target===e.currentTarget) closeSyncModal(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeHabitModal(); closeSyncModal(); }
  if (e.key === 'n' && !e.ctrlKey && !e.metaKey && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) openModal();
});
</script>
